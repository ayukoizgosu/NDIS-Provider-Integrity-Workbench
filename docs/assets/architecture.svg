<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F1E6"/>
      <stop offset="1" stop-color="#F2E5D4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF9F2" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#FFF5EA" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1480" height="920" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14312D" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="820" rx="30" fill="url(#bg)"/>

  <text x="78" y="88" fill="#14312D" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="0.22em">SYSTEM OVERVIEW</text>
  <text x="78" y="146" fill="#14312D" font-family="Georgia, serif" font-size="56" font-weight="700">NDIS Provider Integrity Workbench</text>
  <text x="78" y="190" fill="#4E625E" font-family="Segoe UI, Arial, sans-serif" font-size="24">Public-record ingestion, analyst review, case management, and exportable brief generation.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="260" width="320" height="240" rx="28" fill="url(#panel)" stroke="#E4D4C1"/>
    <rect x="480" y="260" width="320" height="240" rx="28" fill="url(#panel)" stroke="#E4D4C1"/>
    <rect x="890" y="260" width="320" height="240" rx="28" fill="url(#panel)" stroke="#E4D4C1"/>
    <rect x="275" y="588" width="320" height="132" rx="28" fill="url(#panel)" stroke="#E4D4C1"/>
    <rect x="685" y="588" width="320" height="132" rx="28" fill="url(#panel)" stroke="#E4D4C1"/>
  </g>

  <g fill="#B15F31" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="0.18em">
    <text x="104" y="306">PUBLIC SOURCES</text>
    <text x="514" y="306">PROCESSING LAYER</text>
    <text x="924" y="306">REVIEW APPLICATION</text>
    <text x="309" y="632">PERSISTENCE</text>
    <text x="719" y="632">OUTPUTS</text>
  </g>

  <g fill="#14312D" font-family="Georgia, serif" font-weight="700">
    <text x="104" y="360" font-size="28">
      <tspan x="104" dy="0">Registers and</tspan>
      <tspan x="104" dy="32">notices</tspan>
    </text>
    <text x="514" y="360" font-size="28">
      <tspan x="514" dy="0">Matching and</tspan>
      <tspan x="514" dy="32">refresh</tspan>
    </text>
    <text x="924" y="360" font-size="28">
      <tspan x="924" dy="0">Case desk</tspan>
    </text>
    <text x="309" y="682" font-size="28">SQLite case store</text>
    <text x="719" y="682" font-size="28">Briefs and static docs</text>
  </g>

  <g fill="#304945" font-family="Segoe UI, Arial, sans-serif" font-size="21">
    <text x="104" y="432">
      <tspan x="104" dy="0">NDIS Commission export</tspan>
      <tspan x="104" dy="34">ABR / ABN Lookup</tspan>
      <tspan x="104" dy="34">ASIC dataset snapshots</tspan>
    </text>
    <text x="514" y="432">
      <tspan x="514" dy="0">Entity resolution</tspan>
      <tspan x="514" dy="34">Related-business detection</tspan>
      <tspan x="514" dy="34">Live register refresh</tspan>
    </text>
    <text x="924" y="432">
      <tspan x="924" dy="0">Lookup and case creation</tspan>
      <tspan x="924" dy="34">Agent-prepared summaries</tspan>
      <tspan x="924" dy="34">Human-reviewed decisions</tspan>
    </text>
  </g>

  <path d="M390 380H460" stroke="#C56B37" stroke-width="8" stroke-linecap="round"/>
  <path d="M800 380H870" stroke="#C56B37" stroke-width="8" stroke-linecap="round"/>
  <circle cx="460" cy="380" r="10" fill="#C56B37"/>
  <circle cx="870" cy="380" r="10" fill="#C56B37"/>

  <path d="M640 500V548" stroke="#1F4A43" stroke-width="8" stroke-linecap="round"/>
  <path d="M640 548H435V588" stroke="#1F4A43" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M640 548H845V588" stroke="#1F4A43" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="640" cy="548" r="10" fill="#1F4A43"/>
</svg>
